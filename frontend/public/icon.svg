<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#14b8a6"/><stop offset="100%" stop-color="#0d9488"/></linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <!-- Play + analyze motif -->
  <g transform="translate(96,80)">
    <rect x="0" y="0" width="320" height="200" rx="32" fill="none" stroke="url(#g1)" stroke-width="12"/>
    <polygon points="100,60 180,100 100,140" fill="url(#g1)"/>
    <!-- Analysis bars on right -->
    <rect x="220" y="60" width="28" height="80" rx="8" fill="url(#g1)" opacity="0.5"/>
    <rect x="256" y="40" width="28" height="100" rx="8" fill="url(#g1)" opacity="0.7"/>
    <rect x="292" y="50" width="28" height="90" rx="8" fill="url(#g1)"/>
  </g>
  <text x="256" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" letter-spacing="4" fill="#e2e8f0">VA</text>
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="8" fill="#14b8a6" opacity="0.8">VIDEO ANALYZER</text>
</svg>
